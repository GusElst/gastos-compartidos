<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Gastos de las Nenas</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; font-size:16px; }
    input,select,button,textarea { font-family:inherit; font-size:16px; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { border-radius:4px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const THEMES = {
  "dark-orange": {
    name:"🌑 Oscuro Naranja",
    bg:"#0a0a0a", surface:"#141414", surface2:"#1e1e1e", border:"#2a2a2a",
    text:"#f0f0f0", textMuted:"#888", textFaint:"#444",
    accent:"#f97316", accentBg:"#431407", accentText:"#fff",
    success:"#2dd4bf", successBg:"rgba(45,212,191,0.12)", successBorder:"#2dd4bf",
    danger:"#ef4444", dangerBg:"rgba(239,68,68,0.12)", dangerBorder:"#ef4444",
    warn:"#fbbf24", warnBg:"rgba(251,191,36,0.1)", warnBorder:"#f59e0b",
    header:"#111111", nav:"#0f0f0f", scrollThumb:"#333",
  },
  "light-orange": {
    name:"☀️ Claro Naranja",
    bg:"#f5f5f5", surface:"#ffffff", surface2:"#f0f0f0", border:"#e0e0e0",
    text:"#111111", textMuted:"#666", textFaint:"#bbb",
    accent:"#f97316", accentBg:"#fff7ed", accentText:"#fff",
    success:"#0d9488", successBg:"rgba(13,148,136,0.08)", successBorder:"#0d9488",
    danger:"#dc2626", dangerBg:"rgba(220,38,38,0.08)", dangerBorder:"#dc2626",
    warn:"#d97706", warnBg:"rgba(217,119,6,0.08)", warnBorder:"#d97706",
    header:"#ffffff", nav:"#ffffff", scrollThumb:"#ccc",
  },
  "dark-slate": {
    name:"🌑 Oscuro Slate",
    bg:"#0a0a0a", surface:"#141414", surface2:"#1e1e1e", border:"#2a2a2a",
    text:"#f0f0f0", textMuted:"#888", textFaint:"#444",
    accent:"#6366f1", accentBg:"#1e1b4b", accentText:"#fff",
    success:"#22c55e", successBg:"rgba(34,197,94,0.12)", successBorder:"#22c55e",
    danger:"#ef4444", dangerBg:"rgba(239,68,68,0.12)", dangerBorder:"#ef4444",
    warn:"#fbbf24", warnBg:"rgba(251,191,36,0.1)", warnBorder:"#f59e0b",
    header:"#111111", nav:"#0f0f0f", scrollThumb:"#333",
  },
  "light-slate": {
    name:"☀️ Claro Slate",
    bg:"#f5f5f5", surface:"#ffffff", surface2:"#f0f0f0", border:"#e0e0e0",
    text:"#111111", textMuted:"#666", textFaint:"#bbb",
    accent:"#6366f1", accentBg:"#ede9fe", accentText:"#fff",
    success:"#16a34a", successBg:"rgba(22,163,74,0.08)", successBorder:"#16a34a",
    danger:"#dc2626", dangerBg:"rgba(220,38,38,0.08)", dangerBorder:"#dc2626",
    warn:"#d97706", warnBg:"rgba(217,119,6,0.08)", warnBorder:"#d97706",
    header:"#ffffff", nav:"#ffffff", scrollThumb:"#ccc",
  },
};

const CATEGORIES = [
  { id:"colegio",     label:"Colegio / Educación",   emoji:"🎓" },
  { id:"salud",       label:"Salud / Médicos",        emoji:"🏥" },
  { id:"ropa",        label:"Ropa / Calzado",         emoji:"👗" },
  { id:"actividades", label:"Actividades / Deportes", emoji:"⚽" },
  { id:"mascota",     label:"Mascota / Veterinaria",  emoji:"🐾" },
  { id:"otros",       label:"Otros",                  emoji:"📦" },
];

const NENAS        = ["Valen","Pili","Ambas"];
const DESTINATARIOS= ["Valen","Pili","Ambas","Frida"];
const USERS        = ["Gus","Betiana"];
const TOLERANCE    = 2000;
const BUCKET       = "gastos-nenas";

const fmt = n => "$" + Number(n).toLocaleString("es-AR",{minimumFractionDigits:0});
const monthLabel = key => {
  const [y,m] = key.split("-");
  return ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][parseInt(m)-1]+" "+y;
};
const getUserFromURL = () => {
  const p = new URLSearchParams(window.location.search).get("user");
  return p==="Betiana"?"Betiana":p==="Gus"?"Gus":null;
};
const nenaColor = n => n==="Valen"?"#f59e0b":n==="Pili"?"#06b6d4":n==="Frida"?"#f472b6":"#a78bfa";

const api = async (body) => {
  const res = await fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  return res.json();
};

// Subir archivo a Supabase Storage via backend
const uploadToStorage = async (file, path) => {
  const reader = new FileReader();
  return new Promise((resolve, reject) => {
    reader.onload = async e => {
      const base64 = e.target.result.split(",")[1];
      try {
        const r = await api({
          action: "uploadFile",
          bucket: BUCKET,
          path,
          fileBase64: base64,
          mimeType: file.type || "application/octet-stream",
        });
        resolve(r.url || null);
      } catch(err) { reject(err); }
    };
    reader.readAsDataURL(file);
  });
};

function Avatar({user, photo, size=40, t, onClick}) {
  const initials = user==="Gus"?"G":"B";
  const color    = user==="Gus"?t.accent:"#f43f5e";
  return (
    <div onClick={onClick} style={{width:size,height:size,borderRadius:"50%",overflow:"hidden",border:`2px solid ${color}`,cursor:onClick?"pointer":"default",flexShrink:0,background:t.surface2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.4,fontWeight:700,color:color}}>
      {photo ? <img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt={user}/> : initials}
    </div>
  );
}

function App() {
  const currentUser = getUserFromURL();
  const [themeKey,      setThemeKey]      = useState(()=>localStorage.getItem("gastos_theme")||"dark-orange");
  const [expenses,      setExpenses]      = useState([]);
  const [payments,      setPayments]      = useState([]);
  const [gallery,       setGallery]       = useState({});
  const [profiles,      setProfiles]      = useState({});
  const [months,        setMonths]        = useState([]);
  const [dbLoading,     setDbLoading]     = useState(true);
  const [view,          setView]          = useState("dashboard");
  const [filterMonth,   setFilterMonth]   = useState(()=>new Date().toISOString().slice(0,7));
  const [filterCat,     setFilterCat]     = useState("all");
  const [filterNena,    setFilterNena]    = useState("all");
  const [editing,       setEditing]       = useState(null);
  const [form,          setForm]          = useState({who:currentUser||"Gus",amount:"",category:"colegio",nena:"Valen",desc:"",date:new Date().toISOString().slice(0,10),installments:1,isInstallment:false});
  const [cancelInstallConfirm, setCancelInstallConfirm] = useState(null);
  const [scanLoading,   setScanLoading]   = useState(false);
  const [uploadingFile, setUploadingFile] = useState(false);
  const [toast,         setToast]         = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [dupConfirm,    setDupConfirm]    = useState(null);
  const [showPayModal,  setShowPayModal]  = useState(false);
  const [payForm,       setPayForm]       = useState({amount:"",note:"",date:new Date().toISOString().slice(0,10),month:""});
  const [payScanLoad,   setPayScanLoad]   = useState(false);
  const [showLinks,     setShowLinks]     = useState(false);
  const [showSettings,  setShowSettings]  = useState(false);
  const [pendingAlert,  setPendingAlert]  = useState(null); // meses sin compensar
  const [showSearch,    setShowSearch]    = useState(false);
  const [searchQuery,   setSearchQuery]   = useState("");
  const [searchCat,     setSearchCat]     = useState("all");
  const [searchNena,    setSearchNena]    = useState("all");
  const [searchWho,     setSearchWho]     = useState("all");
  const fileRef    = useRef();
  const payFileRef = useRef();
  const photoRef   = useRef();

  const t = THEMES[themeKey];

  useEffect(()=>{
    document.body.style.background = t.bg;
    document.body.style.color = t.text;
    localStorage.setItem("gastos_theme",themeKey);
  },[themeKey,t]);

  const loadData = useCallback(async()=>{
    setDbLoading(true);
    try {
      const r = await api({action:"getAll"});
      if(r.expenses) setExpenses(r.expenses.map(e=>({...e,desc:e.description})));
      if(r.payments) setPayments(r.payments);
      if(r.months)   setMonths(r.months);
      if(r.gallery){
        const g={};
        r.gallery.forEach(i=>{g[i.expense_id]={link:i.link,name:i.name,storagePath:i.storage_path}});
        setGallery(g);
      }
      if(r.profiles){
        const p={};
        r.profiles?.forEach(i=>{p[i.username]={photo:i.photo,theme:i.theme}});
        setProfiles(p);
        if(currentUser&&p[currentUser]?.theme) setThemeKey(p[currentUser].theme);
      }
      // Chequear meses cerrados sin compensar
      if(r.months){
        const pending = r.months.filter(m => m.status === "closed" && !m.settled);
        if(pending.length > 0) setPendingAlert(pending);
      }
    } catch(e){ console.error(e); }
    setDbLoading(false);
  },[currentUser]);

  useEffect(()=>{loadData();},[loadData]);

  const showToast=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};
  const resetForm=()=>{
    setForm({who:currentUser||"Gus",amount:"",category:"colegio",nena:"Valen",desc:"",date:new Date().toISOString().slice(0,10),installments:1,isInstallment:false});
    setEditing(null);
  };

  const saveTheme = async(key)=>{
    setThemeKey(key);
    if(currentUser) await api({action:"upsertProfile",data:{username:currentUser,theme:key,photo:profiles[currentUser]?.photo||null}});
  };

  // Guardar foto de perfil en Supabase Storage
  const savePhoto = async(file)=>{
    try {
      showToast("Subiendo foto...","ok");
      const ext  = file.name?.split(".").pop() || "jpg";
      const path = `profiles/${currentUser}.${ext}`;
      const url  = await uploadToStorage(file, path);
      if(!url) throw new Error("No URL");
      const newProfiles = {...profiles,[currentUser]:{...profiles[currentUser],photo:url}};
      setProfiles(newProfiles);
      await api({action:"upsertProfile",data:{username:currentUser,theme:themeKey,photo:url}});
      showToast("Foto actualizada ✓");
    } catch(e) {
      showToast("Error al subir foto","err");
    }
  };

  const scanFile=async(file,onDone,setLoading)=>{
    setLoading(true);
    const reader=new FileReader();
    reader.onload=async e=>{
      const base64=e.target.result.split(",")[1];
      const isPDF=file.type==="application/pdf";
      try{
        const block=isPDF
          ?{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}}
          :{type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:base64}};
        const res=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:500,
          messages:[{role:"user",content:[block,{type:"text",text:`Analizá este comprobante y devolvé SOLO JSON sin markdown:
{"amount":numero_total,"desc":"descripcion breve","date":"YYYY-MM-DD","category":"colegio|salud|ropa|actividades|mascota|otros","installments":numero,"has_interest":boolean}

Reglas:
- amount: monto TOTAL de la compra (no la cuota individual). Si dice "6 cuotas de $5000" → amount=30000.
- installments: número de cuotas si lo dice explícitamente (ej: "6 cuotas", "cantidad de cuotas: 3", "plan 12 pagos"). Si no hay cuotas → 1.
- has_interest: true SOLO si el total supera el precio base × cuotas (interés financiero real). El costo de envío NO es interés. false si dice "sin interés" o no menciona nada.
- date: fecha del comprobante en formato YYYY-MM-DD. Hoy: ${new Date().toISOString().slice(0,10)}.
- amount: 0 si no podés leer el monto.`}]}]
        })});
        const data=await res.json();
        const parsed=JSON.parse(data.content?.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim());
        onDone(parsed);
        const cuotas = parsed.installments > 1 ? ` · ${parsed.installments} cuotas${parsed.has_interest?" (con interés)":parsed.has_interest===false?" (sin interés)":""}` : "";
        showToast(`Comprobante escaneado ✓${cuotas}`);
      }catch{showToast("No pude leer el archivo","err");}
      setLoading(false);
    };
    reader.readAsDataURL(file);
  };

  // Subir comprobante a Supabase Storage
  const uploadComprobante = async(file, expId, who, month) => {
    try {
      setUploadingFile(true);
      const ext  = file.name?.split(".").pop() || "jpg";
      const path = `comprobantes/${month}/${who}-${expId}.${ext}`;
      const url  = await uploadToStorage(file, path);
      setUploadingFile(false);
      return { url, storagePath: path };
    } catch(e) {
      setUploadingFile(false);
      return null;
    }
  };

  const monthExp  = m=>expenses.filter(e=>e.date.startsWith(m));
  const totalBy   = (m,w)=>monthExp(m).filter(e=>e.who===w).reduce((s,e)=>s+Number(e.amount),0);
  const monthPays = m=>payments.filter(p=>p.month===m);
  const totalPaid = m=>monthPays(m).reduce((s,p)=>s+Number(p.amount),0);

  const getBal = m=>{
    const gus=totalBy(m,"Gus"),bet=totalBy(m,"Betiana"),total=gus+bet,half=total/2;
    const rawDiff=gus-bet,comp=rawDiff/2,paid=totalPaid(m),remaining=Math.max(0,Math.abs(comp)-paid);
    return{gus,bet,total,half,compensation:Math.abs(comp),debtor:comp>0?"Betiana":"Gus",creditor:comp>0?"Gus":"Betiana",paid,remaining,settled:remaining<=TOLERANCE,balanced:Math.abs(rawDiff)<=TOLERANCE};
  };

  const nenaStats=m=>{
    const exps=monthExp(m);
    const vT=exps.filter(e=>e.nena==="Valen"||e.nena==="Ambas").reduce((s,e)=>s+(e.nena==="Ambas"?Number(e.amount)/2:Number(e.amount)),0);
    const pT=exps.filter(e=>e.nena==="Pili"||e.nena==="Ambas").reduce((s,e)=>s+(e.nena==="Ambas"?Number(e.amount)/2:Number(e.amount)),0);
    const fT=exps.filter(e=>e.nena==="Frida").reduce((s,e)=>s+Number(e.amount),0);
    const byCat=nena=>CATEGORIES.map(cat=>({...cat,total:exps.filter(e=>(e.nena===nena||e.nena==="Ambas")&&e.category===cat.id).reduce((s,e)=>s+(e.nena==="Ambas"?Number(e.amount)/2:Number(e.amount)),0)})).filter(c=>c.total>0);
    const fridaCats=CATEGORIES.map(cat=>({...cat,total:exps.filter(e=>e.nena==="Frida"&&e.category===cat.id).reduce((s,e)=>s+Number(e.amount),0)})).filter(c=>c.total>0);
    return{valenTotal:vT,piliTotal:pT,fridaTotal:fT,valenCats:byCat("Valen"),piliCats:byCat("Pili"),fridaCats};
  };

  const getAccDebt=()=>{
    const all=[...new Set(expenses.map(e=>e.date.slice(0,7)))];
    let dG=0,dB=0;
    all.forEach(m=>{const b=getBal(m);if(!b.settled&&b.remaining>0){b.debtor==="Gus"?dG+=b.remaining:dB+=b.remaining;}});
    return{debtGus:dG,debtBet:dB};
  };

  const saveExpense=async(forceSave=false)=>{
    if(!form.amount||isNaN(parseFloat(form.amount))) return showToast("Ingresá un monto válido","err");
    if(!form.desc.trim()) return showToast("Agregá una descripción","err");
    const totalAmount = parseFloat(form.amount);
    const numInstallments = form.isInstallment ? parseInt(form.installments)||1 : 1;
    const installmentAmount = numInstallments > 1 ? Math.round(totalAmount / numInstallments) : totalAmount;
    if(!editing&&!forceSave){
      const dup=expenses.find(e=>Number(e.amount)===totalAmount&&e.date===form.date&&e.who===form.who);
      if(dup) return setDupConfirm({amt:totalAmount,date:form.date});
    }

    try{
      if(editing){
        // Editar solo este gasto individual
        const entry={id:editing,who:form.who,amount:installmentAmount,category:form.category,nena:form.nena,description:form.desc,date:form.date};
        await api({action:"update",table:"expenses",id:editing,data:entry});
        setExpenses(prev=>prev.map(e=>e.id===editing?{...entry,desc:form.desc}:e));
        // Subir comprobante si se adjuntó uno nuevo
        if(form._pendingFile){
          const result=await uploadComprobante(form._pendingFile,editing,form.who,form.date.slice(0,7));
          if(result){
            await api({action:"upsertGallery",data:{expense_id:editing,link:result.url,name:form._pendingFile.name||editing,storage_path:result.storagePath}});
            setGallery(prev=>({...prev,[editing]:{link:result.url,name:form._pendingFile.name||editing}}));
            showToast("Gasto y comprobante actualizados ✓");
          } else { showToast("Gasto actualizado ✓"); }
        } else { showToast("Gasto actualizado ✓"); }
      } else if(numInstallments > 1) {
        // Generar grupo de cuotas
        const groupId = Date.now().toString();
        const newExps = [];
        for(let i=0;i<numInstallments;i++){
          const d = new Date(form.date);
          d.setMonth(d.getMonth()+i);
          const monthStr = d.toISOString().slice(0,7);
          const dayStr   = form.date.slice(8,10);
          const dateStr  = `${monthStr}-${dayStr}`;
          const expId    = `${groupId}-${i+1}`;
          const isCancelled = false;
          const entry={
            id:expId, who:form.who, amount:installmentAmount,
            category:form.category, nena:form.nena,
            description:`${form.desc} (${i+1}/${numInstallments})`,
            date:dateStr,
            installment_group:groupId,
            installment_num:i+1,
            installment_total:numInstallments,
            cancelled:isCancelled,
          };
          await api({action:"insert",table:"expenses",data:entry});
          newExps.push({...entry,desc:entry.description});
        }
        setExpenses(prev=>[...newExps,...prev]);
        // Subir comprobante solo a la cuota 1
        if(form._pendingFile){
          const firstId=`${groupId}-1`;
          const result=await uploadComprobante(form._pendingFile,firstId,form.who,form.date.slice(0,7));
          if(result){
            await api({action:"upsertGallery",data:{expense_id:firstId,link:result.url,name:form._pendingFile.name||firstId,storage_path:result.storagePath}});
            setGallery(prev=>({...prev,[firstId]:{link:result.url,name:form._pendingFile.name||firstId}}));
          }
        }
        showToast(`${numInstallments} cuotas generadas ✓`);
      } else {
        const id=Date.now().toString();
        const entry={id,who:form.who,amount:installmentAmount,category:form.category,nena:form.nena,description:form.desc,date:form.date};
        await api({action:"insert",table:"expenses",data:entry});
        setExpenses(prev=>[{...entry,desc:form.desc},...prev]);
        if(form._pendingFile){
          const result=await uploadComprobante(form._pendingFile,id,form.who,form.date.slice(0,7));
          if(result){
            await api({action:"upsertGallery",data:{expense_id:id,link:result.url,name:form._pendingFile.name||id,storage_path:result.storagePath}});
            setGallery(prev=>({...prev,[id]:{link:result.url,name:form._pendingFile.name||id}}));
          }
        }
        showToast("Gasto cargado ✓");
      }
    }catch(e){showToast("Error al guardar","err");}
    resetForm();setView("dashboard");
  };

  // Cancelar cuotas futuras de un grupo
  const cancelFutureInstallments=async(groupId, fromNum)=>{
    const today=new Date().toISOString().slice(0,10);
    const toCancel=expenses.filter(e=>e.installment_group===groupId&&e.installment_num>fromNum&&e.date>=today&&!e.cancelled);
    for(const e of toCancel){
      await api({action:"update",table:"expenses",id:e.id,data:{...e,cancelled:true,description:e.description+" [cancelada]"}});
    }
    setExpenses(prev=>prev.map(e=>toCancel.find(c=>c.id===e.id)?{...e,cancelled:true,desc:e.desc+" [cancelada]",description:e.description+" [cancelada]"}:e));
    setCancelInstallConfirm(null);
    showToast(`${toCancel.length} cuotas futuras canceladas`);
  };

  const deleteExpense=async(id)=>{
    await api({action:"delete",table:"expenses",id});
    setExpenses(prev=>prev.filter(e=>e.id!==id));
    setDeleteConfirm(null);showToast("Eliminado");
  };

  const savePayment=async()=>{
    if(!payForm.amount||isNaN(parseFloat(payForm.amount))) return showToast("Ingresá un monto válido","err");
    const entry={id:Date.now().toString(),amount:parseFloat(payForm.amount),note:payForm.note,date:payForm.date,month:payForm.month||filterMonth};
    await api({action:"insert",table:"payments",data:entry});
    setPayments(prev=>[entry,...prev]);
    setShowPayModal(false);
    setPayForm({amount:"",note:"",date:new Date().toISOString().slice(0,10),month:""});
    // Actualizar estado del mes si estaba cerrado sin compensar
    const bal = getBal(payForm.month||filterMonth);
    const newRemaining = Math.max(0, bal.compensation - (bal.paid + parseFloat(payForm.amount)));
    if(newRemaining <= TOLERANCE){
      await api({action:"upsertMonth",data:{month:payForm.month||filterMonth,status:"settled",settled:true}});
      setMonths(prev=>prev.map(m=>m.month===(payForm.month||filterMonth)?{...m,status:"settled",settled:true}:m));
      setPendingAlert(prev=>prev?.filter(m=>m.month!==(payForm.month||filterMonth))||null);
    }
    showToast("Compensación registrada ✓");
  };

  // Cierre manual del mes (solo Gus)
  const closeMonth = async(m) => {
    showToast("Cerrando mes...","ok");
    try {
      const r = await fetch("/api/cron",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({month:m})});
      const data = await r.json();
      if(data.success){
        showToast(`Mes ${monthLabel(m)} cerrado ✓`);
        loadData();
      } else {
        showToast(data.reason||"Error al cerrar","err");
      }
    } catch { showToast("Error al cerrar mes","err"); }
  };

  const allMonths=[...new Set([...expenses.map(e=>e.date.slice(0,7)),filterMonth])].sort().reverse();
  const bal   = getBal(filterMonth);
  const ns    = nenaStats(filterMonth);
  const accDebt = getAccDebt();
  const catEmoji=id=>CATEGORIES.find(c=>c.id===id)?.emoji||"📦";
  const catLabel=id=>CATEGORIES.find(c=>c.id===id)?.label||"Otros";
  const filtered=monthExp(filterMonth).filter(e=>(filterCat==="all"||e.category===filterCat)&&(filterNena==="all"||e.nena===filterNena));
  const baseURL=window.location.href.split("?")[0];
  const myPhoto   = profiles[currentUser]?.photo||null;
  const otherUser = currentUser==="Gus"?"Betiana":"Gus";
  const otherPhoto= profiles[otherUser]?.photo||null;
  const isMonthClosed = months.find(m=>m.month===filterMonth)?.status === "closed";
  const isMonthSettled= months.find(m=>m.month===filterMonth)?.status === "settled";

  // Style helpers
  const card=(extra={})=>({background:t.surface,border:`1px solid ${t.border}`,borderRadius:10,...extra});
  const btn=(extra={})=>({border:"none",borderRadius:8,padding:"10px 16px",cursor:"pointer",fontSize:14,fontWeight:600,...extra});
  const inp=(extra={})=>({width:"100%",background:t.surface2,border:`1px solid ${t.border}`,borderRadius:8,padding:"14px 16px",color:t.text,fontSize:16,boxSizing:"border-box",...extra});
  const label=(extra={})=>({fontSize:14,color:t.textMuted,display:"block",marginBottom:8,...extra});
  const mOverlay={position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99,padding:20};
  const mBox={...card(),padding:28,width:"100%",maxWidth:340};

  if(!currentUser) return(
    <div style={{background:t.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,color:t.text}}>
      <div style={{fontSize:56,marginBottom:16}}>👧</div>
      <div style={{fontWeight:700,fontSize:24,marginBottom:8}}>Gastos de las Nenas</div>
      <div style={{color:t.textMuted,fontSize:16,textAlign:"center"}}>Necesitás tu link personal.<br/>Pedíselo a Gus por WhatsApp.</div>
    </div>
  );

  if(dbLoading) return(
    <div style={{background:t.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:t.text}}>
      <div style={{fontSize:48,marginBottom:16}}>👧</div>
      <div style={{color:t.accent,fontSize:16}}>Cargando datos...</div>
    </div>
  );

  return(
    <div style={{background:t.bg,minHeight:"100vh",color:t.text,maxWidth:520,margin:"0 auto"}}>

      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toast.type==="err"?t.dangerBorder:t.successBorder,color:"#fff",padding:"12px 24px",borderRadius:8,fontSize:15,zIndex:100,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>{toast.msg}</div>}
      {uploadingFile&&<div style={{position:"fixed",top:66,left:"50%",transform:"translateX(-50%)",background:t.accentBg,color:t.accent,padding:"10px 20px",borderRadius:8,fontSize:14,zIndex:100,border:`1px solid ${t.accent}`}}>☁️ Subiendo archivo...</div>}

      {/* SEARCH BAR */}


      {/* Banner compensación pendiente */}
      {pendingAlert&&pendingAlert.length>0&&(
        <div style={{background:t.dangerBg,border:`1px solid ${t.dangerBorder}`,borderLeft:`4px solid ${t.danger}`,padding:"14px 18px",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:22}}>⚠️</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:t.danger,fontSize:14}}>Compensación pendiente</div>
            <div style={{fontSize:13,color:t.textMuted,marginTop:2}}>
              {pendingAlert.map(m=>`${monthLabel(m.month)}: ${m.debtor} debe ${fmt(m.remaining)} a ${m.creditor}`).join(" · ")}
            </div>
          </div>
          {currentUser===pendingAlert[0]?.debtor&&(
            <button onClick={()=>{setPayForm(f=>({...f,amount:pendingAlert[0].remaining.toString(),month:pendingAlert[0].month}));setShowPayModal(true);}}
              style={{...btn(),background:t.danger,color:"#fff",padding:"8px 14px",fontSize:13,flexShrink:0}}>Pagar</button>
          )}
        </div>
      )}

      {/* Duplicate */}
      {dupConfirm&&(
        <div style={mOverlay}><div style={{...mBox,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
          <div style={{fontWeight:700,fontSize:17,marginBottom:10,color:t.text}}>Posible duplicado</div>
          <div style={{color:t.textMuted,fontSize:15,marginBottom:24}}>Ya existe un gasto de <strong style={{color:t.accent}}>{fmt(dupConfirm.amt)}</strong> del <strong style={{color:t.accent}}>{dupConfirm.date}</strong>.<br/><br/>¿Querés cargarlo igual?</div>
          <div style={{display:"flex",gap:12}}>
            <button onClick={()=>setDupConfirm(null)} style={{...btn(),flex:1,background:t.surface2,color:t.textMuted}}>Cancelar</button>
            <button onClick={()=>{setDupConfirm(null);saveExpense(true);}} style={{...btn(),flex:1,background:t.warn,color:"#000"}}>Cargar igual</button>
          </div>
        </div></div>
      )}

      {/* Delete */}
      {deleteConfirm&&(
        <div style={mOverlay}><div style={{...mBox,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:12}}>🗑️</div>
          <div style={{fontWeight:700,fontSize:17,marginBottom:24,color:t.text}}>¿Eliminar gasto?</div>
          <div style={{display:"flex",gap:12}}>
            <button onClick={()=>setDeleteConfirm(null)} style={{...btn(),flex:1,background:t.surface2,color:t.textMuted}}>Cancelar</button>
            <button onClick={()=>deleteExpense(deleteConfirm)} style={{...btn(),flex:1,background:t.danger,color:"#fff"}}>Eliminar</button>
          </div>
        </div></div>
      )}

      {/* Cancel installments */}
      {cancelInstallConfirm&&(
        <div style={mOverlay}><div style={{...mBox,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:12}}>🔄</div>
          <div style={{fontWeight:700,fontSize:17,marginBottom:10,color:t.text}}>¿Cancelar cuotas futuras?</div>
          <div style={{color:t.textMuted,fontSize:14,marginBottom:24}}>Se cancelarán las cuotas {cancelInstallConfirm.fromNum+1} a {cancelInstallConfirm.total} de <strong style={{color:t.accent}}>{cancelInstallConfirm.desc}</strong>.<br/>Quedarán registradas como canceladas.</div>
          <div style={{display:"flex",gap:12}}>
            <button onClick={()=>setCancelInstallConfirm(null)} style={{...btn(),flex:1,background:t.surface2,color:t.textMuted}}>No</button>
            <button onClick={()=>cancelFutureInstallments(cancelInstallConfirm.groupId,cancelInstallConfirm.fromNum)} style={{...btn(),flex:1,background:t.warn,color:"#000"}}>Cancelar cuotas</button>
          </div>
        </div></div>
      )}


      {showPayModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:99}}>
          <div style={{...card(),borderRadius:"16px 16px 0 0",padding:28,width:"100%",maxWidth:520}}>
            <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>💸 Registrar compensación</div>
            <div style={{color:t.textMuted,fontSize:14,marginBottom:18}}>{bal.debtor} → {bal.creditor} · {monthLabel(payForm.month||filterMonth)}</div>
            <input type="file" accept="image/*,application/pdf" ref={payFileRef} style={{display:"none"}}
              onChange={e=>e.target.files[0]&&scanFile(e.target.files[0],p=>setPayForm(f=>({...f,amount:p.amount>0?p.amount.toString():f.amount,note:p.desc||f.note,date:p.date||f.date})),setPayScanLoad)}/>
            <button onClick={()=>payFileRef.current.click()} disabled={payScanLoad}
              style={{...btn(),width:"100%",background:t.accentBg,border:`1.5px dashed ${t.accent}`,color:t.accent,marginBottom:16,padding:16}}>
              {payScanLoad?"⏳ Escaneando...":"📷 Subir comprobante de transferencia"}
            </button>
            {[["Monto","number","amount","0"],["Nota","text","note","Ej: Mercado Pago"]].map(([l,tp,k,ph])=>(
              <div key={k} style={{marginBottom:12}}><label style={label()}>{l}</label>
                <input type={tp} value={payForm[k]} onChange={e=>setPayForm(f=>({...f,[k]:e.target.value}))} placeholder={ph} style={inp()}/></div>
            ))}
            <div style={{marginBottom:20}}><label style={label()}>Fecha</label>
              <input type="date" value={payForm.date} onChange={e=>setPayForm(f=>({...f,date:e.target.value}))} style={inp()}/></div>
            <div style={{display:"flex",gap:12}}>
              <button onClick={()=>setShowPayModal(false)} style={{...btn(),flex:1,background:t.surface2,color:t.textMuted}}>Cancelar</button>
              <button onClick={savePayment} style={{...btn(),flex:1,background:t.accent,color:"#fff"}}>Confirmar</button>
            </div>
          </div>
        </div>
      )}

      {/* Settings */}
      {showSettings&&(
        <div style={mOverlay}><div style={{...mBox,maxWidth:380}}>
          <div style={{fontWeight:700,fontSize:18,marginBottom:20,color:t.text}}>⚙️ Configuración</div>
          <div style={{marginBottom:24,textAlign:"center"}}>
            <input type="file" accept="image/*" ref={photoRef} style={{display:"none"}} onChange={e=>e.target.files[0]&&savePhoto(e.target.files[0])}/>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
              <Avatar user={currentUser} photo={myPhoto} size={72} t={t} onClick={()=>photoRef.current.click()}/>
              <button onClick={()=>photoRef.current.click()} style={{...btn(),background:t.surface2,color:t.textMuted,fontSize:13}}>📷 Cambiar foto</button>
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <label style={label()}>Tema visual</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {Object.entries(THEMES).map(([key,th])=>(
                <button key={key} onClick={()=>saveTheme(key)}
                  style={{...btn(),background:themeKey===key?t.accent:t.surface2,color:themeKey===key?"#fff":t.textMuted,fontSize:13,padding:"10px 8px",textAlign:"center"}}>
                  {th.name}
                </button>
              ))}
            </div>
          </div>
          <button onClick={()=>setShowSettings(false)} style={{...btn(),width:"100%",background:t.surface2,color:t.textMuted}}>Cerrar</button>
        </div></div>
      )}

      {/* Links */}
      {showLinks&&currentUser==="Gus"&&(
        <div style={mOverlay}><div style={mBox}>
          <div style={{fontWeight:700,fontSize:18,marginBottom:18,color:t.text}}>🔗 Links de acceso</div>
          {USERS.map(u=>(
            <div key={u} style={{...card({padding:16,marginBottom:12})}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:8,color:t.accent}}>{u}</div>
              <div style={{color:t.textMuted,fontSize:12,wordBreak:"break-all",marginBottom:10}}>{baseURL}?user={u}</div>
              <button onClick={()=>{navigator.clipboard.writeText(`${baseURL}?user=${u}`);showToast(`Link de ${u} copiado ✓`);}}
                style={{...btn(),background:t.accentBg,color:t.accent,fontSize:13}}>📋 Copiar</button>
            </div>
          ))}
          <button onClick={()=>setShowLinks(false)} style={{...btn(),width:"100%",background:t.surface2,color:t.textMuted,marginTop:4}}>Cerrar</button>
        </div></div>
      )}

      {/* HEADER */}
      <div style={{background:t.header,borderBottom:`1px solid ${t.border}`,padding:"16px 18px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <Avatar user={currentUser} photo={myPhoto} size={42} t={t} onClick={()=>setShowSettings(true)}/>
            <div>
              <div style={{fontWeight:700,fontSize:17}}>Hola, {currentUser} 👋</div>
              <div style={{color:t.textMuted,fontSize:13}}>Gastos familiares</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>

            {currentUser==="Gus"&&<button onClick={()=>setShowLinks(true)} style={{...btn(),background:t.surface2,color:t.textMuted,padding:"8px 10px",fontSize:13}}>🔗</button>}
            <button onClick={()=>setShowSettings(true)} style={{...btn(),background:t.surface2,color:t.textMuted,padding:"8px 10px",fontSize:13}}>⚙️</button>
            <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)}
              style={{background:t.surface2,border:`1px solid ${t.border}`,color:t.text,borderRadius:8,padding:"8px 10px",fontSize:13}}>
              {allMonths.map(m=><option key={m} value={m} style={{background:t.surface}}>{monthLabel(m)}</option>)}
            </select>
          </div>
        </div>

        {/* Balance cards */}
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          {USERS.map(w=>{
            const amt=w==="Gus"?bal.gus:bal.bet;
            const isDebtor=!bal.balanced&&w===bal.debtor;
            const borderColor=bal.balanced?t.successBorder:isDebtor?t.danger:t.success;
            return(
              <div key={w} style={{flex:1,...card({padding:"12px 14px",border:`1.5px solid ${borderColor}`})}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <Avatar user={w} photo={w===currentUser?myPhoto:otherPhoto} size={24} t={t}/>
                    <span style={{fontSize:14,fontWeight:700,color:t.text}}>{w}</span>
                  </div>
                  <span style={{width:9,height:9,borderRadius:"50%",background:borderColor,display:"inline-block"}}/>
                </div>
                <div style={{fontSize:21,fontWeight:700}}>{fmt(amt)}</div>
                <div style={{fontSize:12,color:t.textMuted,marginTop:2}}>50% = {fmt(bal.half)}</div>
              </div>
            );
          })}
        </div>

        {/* Nenas + Frida */}
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {[["Valen","🌟",ns.valenTotal],["Pili","💫",ns.piliTotal],["Frida","🐱",ns.fridaTotal]].map(([n,icon,total])=>(
            <div key={n} style={{flex:1,...card({padding:"10px 10px",border:`1px solid ${nenaColor(n)}33`})}}>
              <div style={{fontSize:12,color:nenaColor(n),fontWeight:700}}>{icon} {n}</div>
              <div style={{fontSize:16,fontWeight:700,marginTop:3}}>{fmt(total)}</div>
            </div>
          ))}
        </div>

        {/* Status */}
        <div style={{background:bal.balanced?t.successBg:t.dangerBg,border:`1px solid ${bal.balanced?t.successBorder:t.dangerBorder}`,borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>{bal.balanced?"✅":"⚠️"}</span>
            <span style={{fontSize:14,color:bal.balanced?t.success:t.danger}}>
              {bal.balanced?`Parejos · dif. ${fmt(bal.compensation)}`:`${bal.debtor} debe ${fmt(bal.remaining)} a ${bal.creditor}`}
            </span>
          </div>
          {!bal.balanced&&!bal.settled&&currentUser===bal.debtor&&(
            <button onClick={()=>{setPayForm(f=>({...f,amount:bal.remaining.toString(),month:filterMonth}));setShowPayModal(true);}}
              style={{...btn(),background:t.accent,color:"#fff",padding:"7px 14px",fontSize:13}}>Pagar</button>
          )}
        </div>

        {(accDebt.debtGus>0||accDebt.debtBet>0)&&(
          <div style={{marginTop:10,background:t.warnBg,border:`1px solid ${t.warnBorder}`,borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
            <span>📊</span>
            <span style={{fontSize:14,color:t.warn}}>Deuda acumulada: {accDebt.debtGus>0?`Gus debe ${fmt(accDebt.debtGus)}`:`Betiana debe ${fmt(accDebt.debtBet)}`}</span>
          </div>
        )}

        {(isMonthClosed||isMonthSettled)&&(
          <div style={{marginTop:10,background:t.surface2,border:`1px solid ${t.border}`,borderRadius:8,padding:"8px 14px",fontSize:13,color:t.textMuted,textAlign:"center"}}>
            {isMonthSettled?"✅ Mes cerrado y compensado":"🔒 Mes cerrado · compensación pendiente"}
          </div>
        )}
      </div>

      {/* NAV */}
      <div style={{display:"flex",background:t.nav,borderBottom:`1px solid ${t.border}`}}>
        {[["dashboard","🏠","Inicio"],["history","📋","Historial"],["summary","📊","Resumen"],["archivo","📁","Archivo"],["search","🔍","Buscar"]].map(([v,icon,lbl])=>(
          <button key={v} onClick={()=>{setView(v);if(v==="search"){setSearchQuery("");setSearchCat("all");setSearchNena("all");setSearchWho("all");}}}
            style={{flex:1,background:"none",border:"none",padding:"13px 4px",color:view===v?t.accent:t.textMuted,fontSize:11,cursor:"pointer",borderBottom:view===v?`2px solid ${t.accent}`:"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <span style={{fontSize:18}}>{icon}</span>{lbl}
          </button>
        ))}
      </div>

      <div style={{padding:18,paddingBottom:100}}>

        {/* DASHBOARD */}
        {view==="dashboard"&&(
          <div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>Últimos gastos · {monthLabel(filterMonth)}</div>
            {monthExp(filterMonth).length===0
              ?<div style={{textAlign:"center",padding:"50px 0",color:t.textMuted,fontSize:16}}>No hay gastos este mes</div>
              :monthExp(filterMonth).filter(e=>!e.cancelled).map(e=>(
                <div key={e.id} style={{...card({padding:"14px 16px",marginBottom:10,opacity:e.cancelled?0.5:1}),display:"flex",alignItems:"center",gap:14}}>
                  <div style={{fontSize:26}}>{catEmoji(e.category)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.desc||e.description}</div>
                    <div style={{fontSize:13,color:t.textMuted,marginTop:4,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <span>{e.date}</span>
                      <div style={{display:"flex",alignItems:"center",gap:4}}>
                        <Avatar user={e.who} photo={e.who===currentUser?myPhoto:otherPhoto} size={18} t={t}/>
                        <span style={{fontWeight:600,color:t.text,fontSize:13}}>{e.who}</span>
                      </div>
                      {e.nena&&<span style={{background:t.surface2,color:nenaColor(e.nena),borderRadius:6,padding:"1px 7px",fontSize:12,fontWeight:700,border:`1px solid ${nenaColor(e.nena)}44`}}>{e.nena==="Frida"?"🐱 ":""}{e.nena}</span>}
                      {e.installment_group&&<span style={{background:t.accentBg,color:t.accent,borderRadius:6,padding:"1px 7px",fontSize:12,fontWeight:700}}>💳 {e.installment_num}/{e.installment_total}</span>}
                      {gallery[e.id]&&<a href={gallery[e.id].link} target="_blank" rel="noreferrer" style={{color:t.accent,fontSize:12}}>☁️ Ver</a>}
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:700,fontSize:17}}>{fmt(e.amount)}</div>
                    {e.who===currentUser&&(
                      <div style={{display:"flex",gap:6,marginTop:6,justifyContent:"flex-end"}}>
                        {!e.installment_group&&<button onClick={()=>{setForm({who:e.who,amount:e.amount.toString(),category:e.category,nena:e.nena||"Valen",desc:e.desc||e.description,date:e.date,installments:1,isInstallment:false});setEditing(e.id);setView("form");}}
                          style={{...btn(),background:t.surface2,color:t.accent,padding:"5px 10px",fontSize:13}}>✏️</button>}
                        {e.installment_group&&e.installment_num<e.installment_total&&(
                          <button onClick={()=>setCancelInstallConfirm({groupId:e.installment_group,fromNum:e.installment_num,total:e.installment_total,desc:form.desc||e.description?.split(" (")[0]})}
                            style={{...btn(),background:t.surface2,color:t.warn,padding:"5px 10px",fontSize:13}}>✂️</button>
                        )}
                        <button onClick={()=>setDeleteConfirm(e.id)} style={{...btn(),background:t.surface2,color:t.danger,padding:"5px 10px",fontSize:13}}>🗑️</button>
                      </div>
                    )}
                  </div>
                </div>
              ))}
          </div>
        )}

        {/* HISTORY */}
        {view==="history"&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
              <button onClick={()=>setFilterCat("all")} style={{...btn(),background:filterCat==="all"?t.accent:t.surface2,color:filterCat==="all"?"#fff":t.textMuted,borderRadius:20,padding:"6px 14px",fontSize:13,whiteSpace:"nowrap"}}>Todos</button>
              {CATEGORIES.map(c=>(
                <button key={c.id} onClick={()=>setFilterCat(c.id)} style={{...btn(),background:filterCat===c.id?t.accent:t.surface2,color:filterCat===c.id?"#fff":t.textMuted,borderRadius:20,padding:"6px 14px",fontSize:13,whiteSpace:"nowrap"}}>
                  {c.emoji} {c.label.split("/")[0].trim()}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
              <button onClick={()=>setFilterNena("all")} style={{...btn(),background:filterNena==="all"?t.accent:t.surface2,color:filterNena==="all"?"#fff":t.textMuted,borderRadius:20,padding:"6px 14px",fontSize:13,whiteSpace:"nowrap"}}>Todos</button>
              {DESTINATARIOS.map(n=>(
                <button key={n} onClick={()=>setFilterNena(n)} style={{...btn(),background:filterNena===n?nenaColor(n):t.surface2,color:filterNena===n?"#fff":t.textMuted,borderRadius:20,padding:"6px 14px",fontSize:13,whiteSpace:"nowrap"}}>
                  {n==="Valen"?"🌟":n==="Pili"?"💫":n==="Frida"?"🐱":"🤝"} {n}
                </button>
              ))}
            </div>
            {filtered.filter(e=>!e.cancelled).length===0
              ?<div style={{textAlign:"center",padding:"50px 0",color:t.textMuted,fontSize:16}}>No hay gastos</div>
              :filtered.filter(e=>!e.cancelled).map(e=>(
                <div key={e.id} style={{...card({padding:"14px 16px",marginBottom:10}),display:"flex",alignItems:"center",gap:14}}>
                  <div style={{fontSize:24}}>{catEmoji(e.category)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.desc||e.description}</div>
                    <div style={{fontSize:13,color:t.textMuted,marginTop:4,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                      <span>{e.date}</span>
                      <div style={{display:"flex",alignItems:"center",gap:4}}>
                        <Avatar user={e.who} photo={e.who===currentUser?myPhoto:otherPhoto} size={18} t={t}/>
                        <span style={{fontWeight:600,color:t.text,fontSize:13}}>{e.who}</span>
                      </div>
                      {e.nena&&<span style={{background:t.surface2,color:nenaColor(e.nena),borderRadius:6,padding:"1px 7px",fontSize:12,fontWeight:700,border:`1px solid ${nenaColor(e.nena)}44`}}>{e.nena==="Frida"?"🐱 ":""}{e.nena}</span>}
                      {e.installment_group&&<span style={{background:t.accentBg,color:t.accent,borderRadius:6,padding:"1px 7px",fontSize:12,fontWeight:700}}>💳 {e.installment_num}/{e.installment_total}</span>}
                      <span style={{color:t.textFaint}}>{catLabel(e.category)}</span>
                      {gallery[e.id]&&<a href={gallery[e.id].link} target="_blank" rel="noreferrer" style={{color:t.accent,fontSize:12}}>☁️</a>}
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:700,fontSize:15}}>{fmt(e.amount)}</div>
                    {e.who===currentUser&&(
                      <div style={{display:"flex",gap:6,marginTop:6,justifyContent:"flex-end"}}>
                        {!e.installment_group&&<button onClick={()=>{setForm({who:e.who,amount:e.amount.toString(),category:e.category,nena:e.nena||"Valen",desc:e.desc||e.description,date:e.date,installments:1,isInstallment:false});setEditing(e.id);setView("form");}}
                          style={{...btn(),background:t.surface2,color:t.accent,padding:"5px 10px",fontSize:13}}>✏️</button>}
                        {e.installment_group&&e.installment_num<e.installment_total&&(
                          <button onClick={()=>setCancelInstallConfirm({groupId:e.installment_group,fromNum:e.installment_num,total:e.installment_total,desc:e.description?.split(" (")[0]})}
                            style={{...btn(),background:t.surface2,color:t.warn,padding:"5px 10px",fontSize:13}}>✂️</button>
                        )}
                        <button onClick={()=>setDeleteConfirm(e.id)} style={{...btn(),background:t.surface2,color:t.danger,padding:"5px 10px",fontSize:13}}>🗑️</button>
                      </div>
                    )}
                  </div>
                </div>
              ))}
          </div>
        )}

        {/* SUMMARY */}
        {view==="summary"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:16}}>Resumen · {monthLabel(filterMonth)}</div>
            </div>
            <div style={{...card({padding:18,marginBottom:12})}}>
              {[["Total del mes",fmt(bal.total)],["50% cada uno",fmt(bal.half)]].map(([l,v])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <span style={{color:t.textMuted,fontSize:15}}>{l}</span><span style={{fontWeight:700,fontSize:15}}>{v}</span>
                </div>
              ))}
              <div style={{height:1,background:t.border,margin:"10px 0"}}/>
              {USERS.map(w=>{const amt=w==="Gus"?bal.gus:bal.bet,diff=amt-bal.half;return(
                <div key={w} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:15,fontWeight:700,color:t.text}}>{w} gastó</span>
                  <div><span style={{fontWeight:700,fontSize:15}}>{fmt(amt)}</span>
                    <span style={{fontSize:13,marginLeft:10,color:diff>TOLERANCE?t.danger:diff<-TOLERANCE?t.success:t.textMuted}}>{diff>=0?`+${fmt(diff)}`:fmt(diff)}</span>
                  </div>
                </div>
              );})}
            </div>

            <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>👧 Por integrante</div>
            <div style={{display:"flex",gap:10,marginBottom:10}}>
              {[["Valen","🌟",ns.valenTotal,ns.valenCats],["Pili","💫",ns.piliTotal,ns.piliCats]].map(([n,icon,total,cats])=>(
                <div key={n} style={{flex:1,...card({padding:14,border:`1px solid ${nenaColor(n)}33`})}}>
                  <div style={{color:nenaColor(n),fontWeight:700,fontSize:14,marginBottom:6}}>{icon} {n}</div>
                  <div style={{fontSize:20,fontWeight:700,marginBottom:8}}>{fmt(total)}</div>
                  {cats.map(c=>(<div key={c.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:t.textMuted,marginBottom:5}}><span>{c.emoji} {c.label.split("/")[0].trim()}</span><span style={{color:t.text,fontWeight:600}}>{fmt(c.total)}</span></div>))}
                  {cats.length===0&&<div style={{fontSize:13,color:t.textFaint}}>Sin gastos</div>}
                </div>
              ))}
            </div>
            <div style={{...card({padding:14,marginBottom:12,border:`1px solid ${nenaColor("Frida")}33`})}}>
              <div style={{color:nenaColor("Frida"),fontWeight:700,fontSize:14,marginBottom:6}}>🐱 Frida</div>
              <div style={{fontSize:20,fontWeight:700,marginBottom:8}}>{fmt(ns.fridaTotal)}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {ns.fridaCats.map(c=>(<div key={c.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:t.textMuted,minWidth:120,flex:1}}><span>{c.emoji} {c.label.split("/")[0].trim()}</span><span style={{color:t.text,fontWeight:600,marginLeft:8}}>{fmt(c.total)}</span></div>))}
                {ns.fridaCats.length===0&&<div style={{fontSize:13,color:t.textFaint}}>Sin gastos este mes 😸</div>}
              </div>
            </div>

            <div style={{background:bal.settled?t.successBg:t.dangerBg,border:`1px solid ${bal.settled?t.successBorder:t.dangerBorder}`,borderRadius:10,padding:18,marginBottom:12,textAlign:"center"}}>
              {bal.settled
                ?<><div style={{fontSize:32}}>✅</div><div style={{fontWeight:700,fontSize:16,color:t.success,marginTop:8}}>¡Compensado!</div></>
                :<><div style={{fontSize:32}}>💸</div>
                  <div style={{fontWeight:700,fontSize:15,color:t.danger,marginTop:8}}>{bal.debtor} debe {fmt(bal.remaining)} a {bal.creditor}</div>
                  {bal.paid>0&&<div style={{color:t.textMuted,fontSize:14,marginTop:6}}>Ya pagó {fmt(bal.paid)} de {fmt(bal.compensation)}</div>}
                  {currentUser===bal.debtor&&(
                    <button onClick={()=>{setPayForm(f=>({...f,amount:bal.remaining.toString(),month:filterMonth}));setShowPayModal(true);}}
                      style={{...btn(),marginTop:14,background:t.accent,color:"#fff",padding:"12px 24px",fontSize:15}}>💸 Registrar pago</button>
                  )}
                </>}
            </div>

            {(accDebt.debtGus>0||accDebt.debtBet>0)&&(
              <div style={{background:t.warnBg,border:`1px solid ${t.warnBorder}`,borderRadius:10,padding:14,marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:14,color:t.warn,marginBottom:4}}>📊 Deuda acumulada</div>
                {accDebt.debtGus>0&&<div style={{fontSize:14,color:t.danger}}>Gus debe {fmt(accDebt.debtGus)}</div>}
                {accDebt.debtBet>0&&<div style={{fontSize:14,color:t.danger}}>Betiana debe {fmt(accDebt.debtBet)}</div>}
              </div>
            )}

            {monthPays(filterMonth).length>0&&(
              <div style={{marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:15,marginBottom:10}}>💸 Pagos registrados</div>
                {monthPays(filterMonth).map(p=>{
                  const comp=gallery[p.id];
                  return(
                  <div key={p.id} style={{...card({padding:"16px",marginBottom:10,border:`1px solid ${t.successBorder}44`})}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:38,height:38,borderRadius:"50%",background:t.successBg,border:`1.5px solid ${t.successBorder}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>💸</div>
                        <div>
                          <div style={{fontWeight:700,fontSize:15,color:t.text}}>{p.note||"Transferencia"}</div>
                          <div style={{fontSize:12,color:t.textMuted,marginTop:2}}>Mes: {monthLabel(p.month||filterMonth)}</div>
                        </div>
                      </div>
                      <div style={{fontWeight:700,fontSize:18,color:t.success}}>{fmt(p.amount)}</div>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:`1px solid ${t.border}`,paddingTop:10}}>
                      <div style={{fontSize:13,color:t.textMuted}}>📅 {p.date}</div>
                      {comp
                        ?<a href={comp.link} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:6,background:t.accentBg,border:`1px solid ${t.accent}`,borderRadius:8,padding:"6px 12px",color:t.accent,fontSize:13,fontWeight:600,textDecoration:"none"}}>
                          🧾 Ver comprobante
                        </a>
                        :<span style={{fontSize:12,color:t.textFaint}}>Sin comprobante</span>
                      }
                    </div>
                  </div>
                );})}
              </div>
            )}

            <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>Por categoría</div>
            {CATEGORIES.map(cat=>{
              const total=monthExp(filterMonth).filter(e=>e.category===cat.id).reduce((s,e)=>s+Number(e.amount),0);
              if(!total) return null;
              const pct=bal.total>0?(total/bal.total)*100:0;
              return(
                <div key={cat.id} style={{...card({padding:"12px 16px",marginBottom:8})}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:15}}>{cat.emoji} {cat.label}</span><span style={{fontWeight:700,fontSize:15}}>{fmt(total)}</span></div>
                  <div style={{background:t.surface2,borderRadius:4,height:5}}><div style={{background:cat.id==="mascota"?nenaColor("Frida"):t.accent,height:5,borderRadius:4,width:`${pct}%`}}/></div>
                </div>
              );
            })}
          </div>
        )}

        {/* BUSCAR */}
        {view==="search"&&(
          <div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>🔍 Buscar gastos</div>

            {/* Input */}
            <div style={{marginBottom:14}}>
              <input
                autoFocus
                value={searchQuery}
                onChange={e=>setSearchQuery(e.target.value)}
                placeholder="Descripción, monto o nombre..."
                style={{width:"100%",background:t.surface2,border:`1.5px solid ${searchQuery?t.accent:t.border}`,borderRadius:10,padding:"14px 16px",color:t.text,fontSize:15,boxSizing:"border-box",outline:"none"}}
              />
            </div>

            {/* Filtro: Categoría */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:12,color:t.textMuted,marginBottom:6,fontWeight:600}}>CATEGORÍA</div>
              <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
                <button onClick={()=>setSearchCat("all")} style={{...btn(),background:searchCat==="all"?t.accent:t.surface2,color:searchCat==="all"?"#fff":t.textMuted,borderRadius:20,padding:"5px 12px",fontSize:12,whiteSpace:"nowrap"}}>Todas</button>
                {CATEGORIES.map(c=>(
                  <button key={c.id} onClick={()=>setSearchCat(c.id=== searchCat?"all":c.id)} style={{...btn(),background:searchCat===c.id?t.accent:t.surface2,color:searchCat===c.id?"#fff":t.textMuted,borderRadius:20,padding:"5px 12px",fontSize:12,whiteSpace:"nowrap"}}>
                    {c.emoji} {c.label.split("/")[0].trim()}
                  </button>
                ))}
              </div>
            </div>

            {/* Filtro: Para quién */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:12,color:t.textMuted,marginBottom:6,fontWeight:600}}>PARA QUIÉN</div>
              <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
                <button onClick={()=>setSearchNena("all")} style={{...btn(),background:searchNena==="all"?t.accent:t.surface2,color:searchNena==="all"?"#fff":t.textMuted,borderRadius:20,padding:"5px 12px",fontSize:12,whiteSpace:"nowrap"}}>Todas</button>
                {DESTINATARIOS.map(n=>(
                  <button key={n} onClick={()=>setSearchNena(n===searchNena?"all":n)} style={{...btn(),background:searchNena===n?nenaColor(n):t.surface2,color:searchNena===n?"#fff":t.textMuted,borderRadius:20,padding:"5px 12px",fontSize:12,whiteSpace:"nowrap"}}>
                    {n==="Valen"?"🌟":n==="Pili"?"💫":n==="Frida"?"🐱":"🤝"} {n}
                  </button>
                ))}
              </div>
            </div>

            {/* Filtro: Quién pagó */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,color:t.textMuted,marginBottom:6,fontWeight:600}}>QUIÉN PAGÓ</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setSearchWho("all")} style={{...btn(),background:searchWho==="all"?t.accent:t.surface2,color:searchWho==="all"?"#fff":t.textMuted,borderRadius:20,padding:"5px 12px",fontSize:12}}>Ambos</button>
                {USERS.map(u=>(
                  <button key={u} onClick={()=>setSearchWho(u===searchWho?"all":u)} style={{...btn(),background:searchWho===u?t.accent:t.surface2,color:searchWho===u?"#fff":t.textMuted,borderRadius:20,padding:"5px 12px",fontSize:12}}>
                    {u}
                  </button>
                ))}
              </div>
            </div>

            {/* Resultados */}
            {(()=>{
              const q=searchQuery.trim().toLowerCase();
              const results=expenses.filter(e=>{
                const desc=(e.desc||e.description||"").toLowerCase();
                const amt=String(e.amount);
                const who=(e.who||"").toLowerCase();
                const matchText=q.length<2||desc.includes(q)||amt.includes(q)||who.includes(q);
                const matchCat=searchCat==="all"||e.category===searchCat;
                const matchNena=searchNena==="all"||e.nena===searchNena;
                const matchWho=searchWho==="all"||e.who===searchWho;
                return matchText&&matchCat&&matchNena&&matchWho&&!e.cancelled;
              }).sort((a,b)=>b.date.localeCompare(a.date));

              const hasFilters=q.length>=2||searchCat!=="all"||searchNena!=="all"||searchWho!=="all";
              if(!hasFilters) return(
                <div style={{textAlign:"center",padding:"40px 0",color:t.textMuted}}>
                  <div style={{fontSize:40,marginBottom:12}}>🔍</div>
                  <div style={{fontSize:14}}>Escribí algo o seleccioná un filtro</div>
                </div>
              );

              return(
                <div>
                  <div style={{fontSize:13,color:t.textMuted,marginBottom:10}}>{results.length} resultado{results.length!==1?"s":""} en todos los meses</div>
                  {results.length===0
                    ?<div style={{textAlign:"center",padding:"30px 0",color:t.textMuted,fontSize:14}}>Sin resultados</div>
                    :results.map(e=>(
                      <div key={e.id} style={{...card({padding:"14px",marginBottom:8}),display:"flex",alignItems:"center",gap:12}}>
                        <div style={{fontSize:24,flexShrink:0}}>{CATEGORIES.find(c=>c.id===e.category)?.emoji||"📦"}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.desc||e.description}</div>
                          <div style={{fontSize:12,color:t.textMuted,marginTop:3,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                            <span style={{background:t.surface2,borderRadius:4,padding:"1px 6px"}}>{monthLabel(e.date.slice(0,7))}</span>
                            <span>{e.date}</span>
                            <span style={{fontWeight:600,color:t.text}}>{e.who}</span>
                            {e.nena&&<span style={{color:nenaColor(e.nena),fontWeight:700,border:`1px solid ${nenaColor(e.nena)}44`,borderRadius:4,padding:"1px 6px"}}>{e.nena}</span>}
                            {gallery[e.id]&&<a href={gallery[e.id].link} target="_blank" rel="noreferrer" style={{color:t.accent}}>🧾</a>}
                          </div>
                        </div>
                        <div style={{fontWeight:700,fontSize:15,flexShrink:0,color:t.text}}>{fmt(e.amount)}</div>
                      </div>
                    ))
                  }
                </div>
              );
            })()}
          </div>
        )}

        {/* ARCHIVO — historial de meses cerrados */}
        {view==="archivo"&&(
          <div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>📁 Archivo mensual</div>
            <div style={{color:t.textMuted,fontSize:13,marginBottom:20}}>Meses cerrados con su reporte completo</div>

            {months.length===0
              ?<div style={{textAlign:"center",padding:"50px 0",color:t.textMuted,fontSize:15}}>
                <div style={{fontSize:40,marginBottom:12}}>📭</div>
                Todavía no hay meses cerrados
              </div>
              :months.map(m=>{
                const settled = m.status==="settled"||m.settled;
                return(
                  <div key={m.month} style={{...card({padding:18,marginBottom:12,border:`1.5px solid ${settled?t.successBorder:t.dangerBorder}33`})}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:16}}>{monthLabel(m.month)}</div>
                        <div style={{fontSize:12,color:t.textMuted,marginTop:2}}>
                          Cerrado el {m.closed_at ? new Date(m.closed_at).toLocaleDateString("es-AR") : "-"}
                        </div>
                      </div>
                      <span style={{background:settled?t.successBg:t.dangerBg,color:settled?t.success:t.danger,border:`1px solid ${settled?t.successBorder:t.dangerBorder}`,borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:700}}>
                        {settled?"✅ Compensado":"⚠️ Pendiente"}
                      </span>
                    </div>

                    <div style={{display:"flex",gap:8,marginBottom:12}}>
                      <div style={{flex:1,...card({padding:"10px 12px",background:t.surface2})}}>
                        <div style={{fontSize:11,color:t.textMuted}}>Total</div>
                        <div style={{fontWeight:700,fontSize:15,marginTop:2}}>{fmt(m.total||0)}</div>
                      </div>
                      <div style={{flex:1,...card({padding:"10px 12px",background:t.surface2})}}>
                        <div style={{fontSize:11,color:t.textMuted}}>Gus</div>
                        <div style={{fontWeight:700,fontSize:15,marginTop:2}}>{fmt(m.total_gus||0)}</div>
                      </div>
                      <div style={{flex:1,...card({padding:"10px 12px",background:t.surface2})}}>
                        <div style={{fontSize:11,color:t.textMuted}}>Betiana</div>
                        <div style={{fontWeight:700,fontSize:15,marginTop:2}}>{fmt(m.total_bet||0)}</div>
                      </div>
                    </div>

                    {!settled&&(
                      <div style={{background:t.dangerBg,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:13,color:t.danger}}>
                        {m.debtor} debe {fmt(m.remaining||0)} a {m.creditor}
                        {currentUser===m.debtor&&(
                          <button onClick={()=>{setPayForm(f=>({...f,amount:(m.remaining||0).toString(),month:m.month}));setShowPayModal(true);}}
                            style={{...btn(),marginLeft:12,background:t.danger,color:"#fff",padding:"4px 12px",fontSize:12}}>Pagar</button>
                        )}
                      </div>
                    )}

                    {m.report_url&&(
                      <a href={m.report_url} target="_blank" rel="noreferrer"
                        style={{display:"block",textAlign:"center",...btn(),background:t.accentBg,color:t.accent,border:`1px solid ${t.accent}33`,textDecoration:"none",padding:"10px"}}>
                        📄 Ver reporte completo
                      </a>
                    )}
                  </div>
                );
              })
            }
          </div>
        )}

        {/* FORM */}
        {view==="form"&&(
          <div>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
              <button onClick={()=>{resetForm();setView("dashboard");}} style={{...btn(),background:t.surface2,color:t.textMuted}}>← Volver</button>
              <div style={{fontWeight:700,fontSize:17}}>{editing?"Editar gasto":"Nuevo gasto"}</div>
            </div>

            <div style={{...card({padding:"12px 16px",marginBottom:18,border:`1.5px solid ${t.accent}`}),display:"flex",alignItems:"center",gap:12}}>
              <Avatar user={currentUser} photo={myPhoto} size={40} t={t}/>
              <div>
                <div style={{fontSize:13,color:t.textMuted}}>Cargando como</div>
                <div style={{fontWeight:700,color:t.accent,fontSize:17}}>{currentUser}</div>
              </div>
            </div>

            {/* Upload / scan — disponible siempre. En edición solo adjunta sin escanear */}
            <>
              <input type="file" accept="image/*,application/pdf" ref={fileRef} style={{display:"none"}}
                onChange={e=>{
                  if(!e.target.files[0]) return;
                  const f=e.target.files[0];
                  if(editing){
                    // Solo adjuntar, sin tocar los campos del form
                    setForm(prev=>({...prev,_pendingFile:f}));
                    showToast("Comprobante listo para adjuntar ✓");
                  } else {
                    scanFile(f,p=>setForm(prev=>({
                      ...prev,
                      amount:p.amount>0?p.amount.toString():prev.amount,
                      desc:p.desc||prev.desc,
                      date:p.date||prev.date,
                      category:p.category||prev.category,
                      isInstallment:p.installments>1,
                      installments:p.installments>1?p.installments:prev.installments,
                      _pendingFile:f,
                      _hasInterest:p.has_interest||false,
                    })),setScanLoading);
                  }
                }}/>
              <button onClick={()=>fileRef.current.click()} disabled={scanLoading}
                style={{...btn(),width:"100%",background:t.accentBg,border:`1.5px dashed ${t.accent}`,color:t.accent,padding:18,marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:10,boxSizing:"border-box"}}>
                {scanLoading?"⏳ Escaneando..."
                  :editing
                    ?( gallery[editing]?"📎 Reemplazar comprobante":"📎 Adjuntar comprobante")
                    :"📷 Subir foto, captura o PDF (→ Storage)"}
              </button>
              {/* Comprobante ya existente en edición */}
              {editing&&gallery[editing]&&!form._pendingFile&&(
                <div style={{...card({padding:"10px 14px",marginBottom:16,border:`1px solid ${t.accent}33`}),fontSize:13,color:t.accent,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                  <span>☁️ Ya tiene comprobante adjunto</span>
                  <a href={gallery[editing].link} target="_blank" rel="noreferrer" style={{color:t.accent,fontWeight:700,fontSize:12}}>Ver →</a>
                </div>
              )}
              {form._pendingFile&&(
                <div style={{...card({padding:"10px 14px",marginBottom:16,border:`1px solid ${t.successBorder}33`}),fontSize:13,color:t.success,display:"flex",alignItems:"center",gap:8}}>
                  ✅ {form._pendingFile.name} listo para {editing?"adjuntar":"subir"}
                </div>
              )}
            </>

            <div style={{marginBottom:18}}>
              <label style={label()}>¿Para quién es el gasto?</label>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                {["Valen","Pili","Ambas"].map(n=>(
                  <button key={n} onClick={()=>setForm(f=>({...f,nena:n}))}
                    style={{...btn(),flex:1,background:form.nena===n?t.surface2:t.surface,border:`2px solid ${form.nena===n?nenaColor(n):t.border}`,color:form.nena===n?nenaColor(n):t.textMuted,padding:"12px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <span style={{fontSize:20}}>{n==="Valen"?"🌟":n==="Pili"?"💫":"🤝"}</span>
                    <span style={{fontSize:12}}>{n}</span>
                  </button>
                ))}
              </div>
              <button onClick={()=>setForm(f=>({...f,nena:"Frida",category:["colegio","ropa","actividades"].includes(f.category)?"mascota":f.category}))}
                style={{...btn(),width:"100%",background:form.nena==="Frida"?t.surface2:t.surface,border:`2px solid ${form.nena==="Frida"?nenaColor("Frida"):t.border}`,color:form.nena==="Frida"?nenaColor("Frida"):t.textMuted,padding:"12px",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                <span style={{fontSize:20}}>🐱</span>
                <span style={{fontSize:14,fontWeight:700}}>Frida</span>
              </button>
            </div>

            <div style={{marginBottom:16}}><label style={label()}>Monto (ARS)</label>
              <input type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0" style={inp({fontSize:24,fontWeight:700})}/></div>
            <div style={{marginBottom:16}}><label style={label()}>Descripción</label>
              <input value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="Ej: Cuota del colegio..." style={inp()}/></div>

            <div style={{marginBottom:16}}>
              <label style={label()}>Categoría</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {CATEGORIES.map(c=>(
                  <button key={c.id} onClick={()=>setForm(f=>({...f,category:c.id}))}
                    style={{...btn(),background:form.category===c.id?t.accent:t.surface2,color:form.category===c.id?"#fff":t.textMuted,borderRadius:20,padding:"7px 14px",fontSize:13}}>
                    {c.emoji} {c.label.split("/")[0].trim()}
                  </button>
                ))}
              </div>
            </div>

            <div style={{marginBottom:24}}><label style={label()}>Fecha</label>
              <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inp()}/></div>

            {/* Cuotas — solo en modo nuevo */}
            {!editing&&(
              <div style={{...card({padding:16,marginBottom:24,border:`1px solid ${form.isInstallment?t.accent:t.border}`})}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:form.isInstallment?14:0}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:t.text}}>💳 ¿Es en cuotas?</div>
                    {!form.isInstallment&&<div style={{fontSize:12,color:t.textMuted,marginTop:2}}>Activá para dividir en varios meses</div>}
                  </div>
                  <button onClick={()=>setForm(f=>({...f,isInstallment:!f.isInstallment,installments:f.isInstallment?1:2}))}
                    style={{...btn(),background:form.isInstallment?t.accent:t.surface2,color:form.isInstallment?"#fff":t.textMuted,padding:"8px 16px",fontSize:13}}>
                    {form.isInstallment?"✓ Sí":"No"}
                  </button>
                </div>
                {form.isInstallment&&(
                  <div>
                    <label style={label()}>Cantidad de cuotas</label>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {[2,3,6,9,12,18,24].map(n=>(
                        <button key={n} onClick={()=>setForm(f=>({...f,installments:n}))}
                          style={{...btn(),background:form.installments===n?t.accent:t.surface2,color:form.installments===n?"#fff":t.textMuted,padding:"8px 14px",fontSize:14,borderRadius:8}}>
                          {n}x
                        </button>
                      ))}
                    </div>
                    {form.amount&&!isNaN(parseFloat(form.amount))&&(
                      <div style={{marginTop:12,background:t.accentBg,borderRadius:8,padding:"10px 14px",fontSize:13,color:t.accent}}>
                        {form.installments} cuotas de <strong>{fmt(Math.round(parseFloat(form.amount)/form.installments))}</strong> · Total {fmt(parseFloat(form.amount))}
                        {form._hasInterest&&<span style={{marginLeft:8,color:t.warn,fontWeight:700}}>⚠️ Con interés</span>}
                        {form._hasInterest===false&&<span style={{marginLeft:8,color:t.success,fontWeight:700}}>✓ Sin interés</span>}
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            <button onClick={()=>saveExpense(false)}
              style={{...btn(),width:"100%",background:t.accent,color:"#fff",padding:18,fontSize:17}}>
              {editing?"💾 Guardar cambios":"✅ Cargar gasto"}
            </button>
          </div>
        )}
      </div>

      {view!=="form"&&(
        <button onClick={()=>{resetForm();setView("form");}}
          style={{position:"fixed",bottom:28,right:24,width:60,height:60,borderRadius:"50%",background:t.accent,border:"none",color:"#fff",fontSize:30,cursor:"pointer",boxShadow:`0 4px 20px ${t.accent}66`,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
